<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hola Yaquelin 💕</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  background:linear-gradient(-45deg,#833AB4,#FD1D1D,#F77737,#405DE6);
  background-size:400% 400%;
  animation:move 12s ease infinite;
}

@keyframes move{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.container{
  width:100%;
  max-width:600px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(18px);
  border-radius:30px;
  padding:30px;
  color:white;
  box-shadow:0 10px 40px rgba(0,0,0,0.25);
}

h1{
  text-align:center;
  margin-bottom:10px;
}

p{
  font-size:14px;
  opacity:0.95;
  margin-bottom:10px;
}

.welcome{
  text-align:center;
  margin-bottom:20px;
}

label{
  display:block;
  margin-top:15px;
  margin-bottom:6px;
  font-weight:600;
}

input, select, textarea{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  outline:none;
  font-size:14px;
}

textarea{
  resize:none;
}

button{
  width:100%;
  margin-top:20px;
  padding:14px;
  border:none;
  border-radius:15px;
  background:white;
  color:#E1306C;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.03);
}

.section-title{
  margin-top:20px;
  font-weight:700;
  font-size:16px;
  color:#fff;
  border-left:4px solid white;
  padding-left:10px;
}

.footer{
  text-align:center;
  margin-top:15px;
  font-size:12px;
  opacity:0.8;
}
</style>
</head>

<body>

<div class="container">

<!-- SONIDO -->
<audio id="sound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

<div class="welcome">
<h1>✨ Hola, Yaquelin 💕</h1>
<p>Bienvenida a esta pequeña encuesta hecha solo para conocerte un poquito más.</p>
<p>No es nada serio, solo algo divertido y diferente ✨</p>
<p>Gracias por estar aquí 💌</p>
</div>

<form action="https://formspree.io/f/mjgdjgkz" method="POST">

<!-- SOBRE ELLA -->
<div class="section-title">🌸 Sobre ti</div>

<label>¿Cómo te llamas?</label>
<input type="text" name="Nombre" required>

<label>¿Cuántos años tienes?</label>
<input type="number" name="Edad" required>

<label>¿Cuál es tu estado sentimental?</label>
<select name="Estado sentimental">
  <option>Soltera</option>
  <option>En una relación</option>
  <option>Comprometida</option>
  <option>Casada</option>
  <option>Divorciada</option>
  <option>Es complicado</option>
</select>

<!-- PERSONALIDAD -->
<div class="section-title">🌷 Personalidad</div>

<label>¿Cómo te has sentido últimamente?</label>
<select name="Estado emocional">
  <option>Muy feliz</option>
  <option>Feliz</option>
  <option>Normal</option>
  <option>Estresada</option>
  <option>Triste</option>
</select>

<!-- GUSTOS -->
<div class="section-title">🎬 Gustos</div>

<label>¿Cuál es tu película favorita?</label>
<input type="text" name="Película favorita">

<label>¿Cuál es tu comida favorita?</label>
<input type="text" name="Comida favorita">

<!-- CITA -->
<div class="section-title">☕ Posible cita</div>

<label>Si saliéramos, ¿qué plan te gustaría más?</label>
<select name="Plan cita">
  <option>Café ☕</option>
  <option>Película 🎬</option>
  <option>Cenar 🍝</option>
  <option>Helado 🍦</option>
  <option>Pasear 🌳</option>
</select>

<label>Del 1 al 10, ¿qué tan divertida sería una cita conmigo?</label>
<select name="Diversion cita">
  <option>1</option><option>2</option><option>3</option>
  <option>4</option><option>5</option><option>6</option>
  <option>7</option><option>8</option><option>9</option>
  <option>10</option>
</select>

<label>Del 1 al 10, ¿qué probabilidad hay de salir conmigo?</label>
<select name="Probabilidad cita">
  <option>1</option><option>2</option><option>3</option>
  <option>4</option><option>5</option><option>6</option>
  <option>7</option><option>8</option><option>9</option>
  <option>10</option>
</select>

<!-- MENSAJE -->
<div class="section-title">💌 Mensaje final</div>

<label>Si quieres dejarme un mensaje</label>
<textarea name="Mensaje" rows="5" placeholder="Escribe algo bonito..."></textarea>

<button type="submit">Enviar 💕</button>

</form>

<div class="footer">
Hecho con intención de conocerte ✨
</div>

</div>

<script>
const sound = document.getElementById("sound");

document.querySelectorAll("input, select, textarea").forEach(el=>{
  el.addEventListener("focus", ()=>{
    sound.currentTime = 0;
    sound.play().catch(()=>{});
  });
});

document.querySelector("form").addEventListener("submit", ()=>{
  alert("Gracias por responder 💕");
});
</script>

</body>
</html>
