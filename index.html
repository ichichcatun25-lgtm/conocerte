<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yaquelin 💕 Encuesta</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#833AB4,#FD1D1D,#F77737,#405DE6);
background-size:400% 400%;
animation:bg 12s infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
width:90%;
max-width:500px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(18px);
border-radius:25px;
padding:25px;
color:white;
text-align:center;
}

.question{display:none;}
.question.active{display:block;}

.btn{
margin-top:15px;
padding:12px;
width:100%;
border:none;
border-radius:15px;
background:white;
color:#E1306C;
font-weight:700;
cursor:pointer;
}

.option{
display:block;
background:rgba(255,255,255,0.2);
padding:12px;
margin:8px 0;
border-radius:12px;
cursor:pointer;
}

input[type="radio"]{
display:none;
}

label{
display:block;
cursor:pointer;
}
</style>
</head>

<body>

<form id="form" action="https://formspree.io/f/mjgdjgkz" method="POST">

<div class="container">

<!-- 1 -->
<div class="question active">
<h2>✨ Hola Yaquelin 💕</h2>
<p>Encuesta rápida para conocerte</p>
<button type="button" class="btn" onclick="next()">Comenzar</button>
</div>

<!-- 2 -->
<div class="question">
<h3>¿Cómo te llamas?</h3>
<input name="Nombre" required>
<button type="button" class="btn" onclick="next()">Siguiente</button>
</div>

<!-- 3 -->
<div class="question">
<h3>¿Cuántos años tienes?</h3>
<input name="Edad" type="number" required>
<button type="button" class="btn" onclick="next()">Siguiente</button>
</div>

<!-- 4 ESTADO SENTIMENTAL (ARREGLADO) -->
<div class="question">
<h3>Estado sentimental</h3>

<label class="option">
<input type="radio" name="Estado sentimental" value="Soltera" required>
Soltera
</label>

<label class="option">
<input type="radio" name="Estado sentimental" value="En una relación">
En una relación
</label>

<label class="option">
<input type="radio" name="Estado sentimental" value="Complicado">
Es complicado
</label>

<button type="button" class="btn" onclick="next()">Siguiente</button>
</div>

<!-- 5 ESTADO EMOCIONAL (ARREGLADO) -->
<div class="question">
<h3>Estado emocional</h3>

<label class="option">
<input type="radio" name="Estado emocional" value="Feliz" required>
Feliz
</label>

<label class="option">
<input type="radio" name="Estado emocional" value="Normal">
Normal
</label>

<label class="option">
<input type="radio" name="Estado emocional" value="Estresada">
Estresada
</label>

<button type="button" class="btn" onclick="next()">Siguiente</button>
</div>

<!-- 6 -->
<div class="question">
<h3>Película favorita</h3>
<input name="Película favorita">
<button type="button" class="btn" onclick="next()">Siguiente</button>
</div>

<!-- 7 -->
<div class="question">
<h3>Comida favorita</h3>
<input name="Comida favorita">
<button type="button" class="btn" onclick="next()">Siguiente</button>
</div>

<!-- 8 CALIFICACIÓN OPCIONAL -->
<div class="question">
<h3>Del 1 al 10, ¿cómo me calificas? (Opcional)</h3>

<select name="Calificación">
<option>1</option><option>2</option><option>3</option>
<option>4</option><option>5</option><option>6</option>
<option>7</option><option>8</option><option>9</option><option>10</option>
</select>

<button type="button" class="btn" onclick="next()">Siguiente</button>
</div>

<!-- 9 PLAN DE CITA (ARREGLADO) -->
<div class="question">
<h3>¿Qué plan te gustaría?</h3>

<label class="option">
<input type="radio" name="Plan cita" value="Café" required>
☕ Café
</label>

<label class="option">
<input type="radio" name="Plan cita" value="Película">
🎬 Película
</label>

<label class="option">
<input type="radio" name="Plan cita" value="Cenar">
🍝 Cenar
</label>

<label class="option">
<input type="radio" name="Plan cita" value="Pasear">
🌳 Pasear
</label>

<button type="button" class="btn" onclick="next()">Siguiente</button>
</div>

<!-- 10 -->
<div class="question">
<h3>Mensaje final 💌</h3>
<textarea name="Mensaje" rows="4"></textarea>
<button class="btn" type="submit">Enviar 💕</button>
</div>

</div>

</form>

<script>
let i=0;
const q=document.querySelectorAll(".question");

function next(){
q[i].classList.remove("active");
i++;
q[i].classList.add("active");
}
</script>

</body>
</html>
