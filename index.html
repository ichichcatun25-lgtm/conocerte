<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match 💕 Yaquelin</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins;
background:linear-gradient(-45deg,#833AB4,#FD1D1D,#F77737,#405DE6);
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

/* TINDER CARD */
.card{
width:340px;
height:520px;
background:white;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
position:absolute;
overflow:hidden;
display:flex;
flex-direction:column;
}

.card img{
width:100%;
height:65%;
object-fit:cover;
}

.info{
padding:15px;
}

.buttons{
display:flex;
justify-content:space-around;
padding:10px;
}

button{
border:none;
padding:15px;
border-radius:50%;
cursor:pointer;
font-size:18px;
}

.no{background:#ff4d4d;color:white;}
.yes{background:#4CAF50;color:white;}

/* CHAT IG */
.chat{
display:none;
width:360px;
height:600px;
background:#fff;
border-radius:20px;
overflow:hidden;
flex-direction:column;
}

.header{
background:#C13584;
color:white;
padding:12px;
text-align:center;
font-weight:bold;
}

.messages{
flex:1;
padding:10px;
overflow:auto;
background:#fafafa;
}

.msg{
max-width:75%;
padding:10px;
margin:5px;
border-radius:15px;
font-size:14px;
}

.me{
background:#DCF8C6;
margin-left:auto;
}

.her{
background:white;
border:1px solid #eee;
}

/* MATCH SCREEN */
.match{
display:none;
color:white;
text-align:center;
}

.match h1{
font-size:45px;
}

.start{
padding:15px 25px;
border:none;
border-radius:20px;
background:white;
color:#E1306C;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}
</style>
</head>

<body>

<!-- FORM HIDDEN -->
<form id="form" action="https://formspree.io/f/mjgdjgkz" method="POST" style="display:none;">
<input name="Nombre" id="nombre">
<input name="Estado" id="estado">
<input name="Interes" id="interes">
<input name="Resultado" id="resultado">
</form>

<!-- TINDER -->
<div class="card" id="tinder">
<img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e">
<div class="info">
<h2>💘 Yaquelin</h2>
<p>¿Te gustaría conocerlo?</p>
</div>
<div class="buttons">
<button class="no" onclick="swipe(false)">✖️</button>
<button class="yes" onclick="swipe(true)">❤️</button>
</div>
</div>

<!-- MATCH -->
<div class="match" id="match">
<h1>💘 MATCH!</h1>
<p>Se gustaron mutuamente</p>
<button class="start" onclick="startChat()">Continuar 💬</button>
</div>

<!-- CHAT -->
<div class="chat" id="chat">
<div class="header">Instagram DM 💬</div>
<div class="messages" id="messages"></div>
</div>

<script>

let state = {
liked:false,
estado:"",
interes:""
};

function swipe(like){
state.liked = like;

document.getElementById("tinder").style.display="none";

if(like){
document.getElementById("match").style.display="block";
}else{
alert("Tal vez en otro momento 😅");
}
}

function startChat(){
document.getElementById("match").style.display="none";
document.getElementById("chat").style.display="flex";

let m = document.getElementById("messages");

function add(text,cls){
let d = document.createElement("div");
d.className="msg "+cls;
d.innerText=text;
m.appendChild(d);
m.scrollTop=m.scrollHeight;
}

setTimeout(()=>add("Hola Yaquelin 👋","her"),1000);
setTimeout(()=>add("Me gustó conocerte 💕","me"),2000);
setTimeout(()=>add("¿Qué prefieres hacer en una cita? ☕🎬","her"),3000);

setTimeout(()=>{
add("☕ Café","me");
state.interes="Café";
},4000);

setTimeout(()=>{
if(state.interes=="Café"){
add("Me encanta el café también 😍","her");
add("Se siente más natural conocerse así","her");
state.estado="conexion alta";
}else{
add("Interesante elección 😏","her");
state.estado="conexion media";
}
sendForm();
},6000);

}

function sendForm(){
document.getElementById("nombre").value="Yaquelin";
document.getElementById("estado").value=state.estado;
document.getElementById("interes").value=state.interes;
document.getElementById("resultado").value=state.liked?"MATCH":"NO MATCH";

document.getElementById("form").submit();
}

</script>

</body>
</html>
