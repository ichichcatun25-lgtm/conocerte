<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match 💕 Yaquelin</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins;
background:linear-gradient(-45deg,#833AB4,#FD1D1D,#F77737,#405DE6);
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

/* CARD */
.card{
width:320px;
height:420px;
background:white;
border-radius:20px;
position:absolute;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
transition:0.3s;
}

.card h2{
color:#E1306C;
}

.buttons{
position:absolute;
bottom:20px;
display:flex;
gap:20px;
}

.btn{
width:60px;
height:60px;
border-radius:50%;
border:none;
font-size:20px;
cursor:pointer;
}

.no{background:#ff4d4d;color:white;}
.yes{background:#4CAF50;color:white;}

/* CHAT */
.chat{
display:none;
flex-direction:column;
width:350px;
height:500px;
background:#f5f5f5;
border-radius:20px;
overflow:hidden;
}

.header{
background:#075E54;
color:white;
padding:10px;
text-align:center;
font-weight:bold;
}

.messages{
flex:1;
padding:10px;
overflow:auto;
}

.msg{
padding:10px;
margin:5px;
border-radius:10px;
width:fit-content;
max-width:80%;
}

.me{
background:#DCF8C6;
margin-left:auto;
}

.her{
background:white;
}

/* MATCH */
.match{
display:none;
position:absolute;
text-align:center;
color:white;
}

.match h1{
font-size:40px;
}

.startBtn{
padding:15px 25px;
border:none;
border-radius:20px;
background:white;
color:#E1306C;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<!-- FORM (OCULTO) -->
<form id="form" action="https://formspree.io/f/mjgdjgkz" method="POST" style="display:none;">
<input name="Nombre" value="Yaquelin">
<input name="Match" id="matchValue">
</form>

<!-- TINDER CARD -->
<div class="card" id="card">
<h2>💘 Yaquelin</h2>
<p>¿Te gustaría conocerlo?</p>

<div class="buttons">
<button class="btn no" onclick="swipe(false)">✖️</button>
<button class="btn yes" onclick="swipe(true)">❤️</button>
</div>
</div>

<!-- CHAT -->
<div class="chat" id="chat">
<div class="header">💬 Chat</div>
<div class="messages" id="messages"></div>
</div>

<!-- MATCH -->
<div class="match" id="match">
<h1>💘 MATCH!</h1>
<p>Ambos se gustan ✨</p>
<button class="startBtn" onclick="startChat()">Continuar 💬</button>
</div>

<script>
let score = 0;

function swipe(like){
document.getElementById("card").style.display="none";

if(like){
score += 10;
document.getElementById("match").style.display="block";
}else{
score -= 5;
alert("Tal vez otra vez 😅");
}
}

function startChat(){
document.getElementById("match").style.display="none";
document.getElementById("chat").style.display="flex";

let msgBox = document.getElementById("messages");

let msgs = [
"Hola Yaquelin 👋",
"Me gustó conocerte un poco",
"¿Qué te gusta hacer en tu tiempo libre?"
];

let i = 0;

let interval = setInterval(()=>{
if(i >= msgs.length){
clearInterval(interval);
sendForm();
return;
}

let div = document.createElement("div");

div.className = i%2==0 ? "msg me" : "msg her";
div.innerText = msgs[i];

msgBox.appendChild(div);

i++;
},1200);
}

function sendForm(){
document.getElementById("matchValue").value = score>=10 ? "MATCH ALTO" : "MATCH BAJO";
document.getElementById("form").submit();
}
</script>

</body>
</html>
