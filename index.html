<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conociéndote</title>

<style>
body{
font-family: Arial;
background: linear-gradient(135deg,#ff4d6d,#ff758f);
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.container{
background: rgba(255,255,255,0.15);
padding:25px;
border-radius:20px;
width:90%;
max-width:500px;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:10px;
}

button{
margin-top:15px;
padding:10px;
width:100%;
border:none;
border-radius:10px;
background:white;
color:#ff4d6d;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>Hola Jacqueline 😊</h2>
<p>Me gustaría conocerte un poco más 💖</p>

<form action="https://formspree.io/f/mjgdjgkz" method="POST">

<input name="nombre" placeholder="¿Cómo te llamas?" required>

<input name="edad" placeholder="Edad" type="number">

<input name="pelicula" placeholder="Película favorita">

<input name="comida" placeholder="Comida favorita">

<select name="estado">
<option>Soltera</option>
<option>En una relación</option>
<option>Comprometida</option>
<option>Casada</option>
</select>

<input name="calificacion" placeholder="¿Qué me das del 1 al 10? (opcional)">

<select name="seguir">
<option>Sí 😊</option>
<option>Tal vez 🤔</option>
<option>Necesito conocerte más 😅</option>
</select>

<textarea name="mensaje" placeholder="Mensaje opcional"></textarea>

<button type="submit">Enviar</button>

</form>

<p>Jacqueline, me gustó conocerte 💖</p>

</div>

</body>
</html>
