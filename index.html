<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conociéndote 💖</title>

<style>
body{
margin:0;
font-family: Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: radial-gradient(circle at top,#1b1b2f,#16213e,#0f3460);
color:white;
overflow:hidden;
}

.card{
background: rgba(255,255,255,0.08);
backdrop-filter: blur(15px);
padding:30px;
border-radius:20px;
width:90%;
max-width:450px;
box-shadow:0 10px 40px rgba(0,0,0,0.5);
text-align:center;
position:relative;
}

h2{
margin-bottom:15px;
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
outline:none;
}

button{
margin-top:15px;
padding:12px;
width:100%;
border:none;
border-radius:12px;
background:#ff4d6d;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.step{
display:none;
opacity:0;
transform:translateY(20px);
transition:0.5s;
}

.active{
display:block;
opacity:1;
transform:translateY(0);
}

.music-btn{
position:absolute;
top:10px;
right:10px;
background:#ffffff22;
padding:8px;
border-radius:10px;
cursor:pointer;
font-size:12px;
}
</style>
</head>

<body>

<!-- AUDIO (NO autoplay por reglas del navegador) -->
<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b1f0.mp3?filename=soft-love-ambient-110397.mp3" type="audio/mp3">
</audio>

<div class="card">

<div class="music-btn" onclick="toggleMusic()">🎵 Música</div>

<form action="https://formspree.io/f/mjgdjgkz" method="POST">

<!-- STEP 1 -->
<div class="step active">
<h2>Hola Jacqueline 💖</h2>
<p>Te hice algo especial para conocerte mejor</p>
<button type="button" onclick="next()">Comenzar</button>
</div>

<!-- STEP 2 -->
<div class="step">
<h2>¿Cómo te llamas?</h2>
<input name="nombre" required>
<button type="button" onclick="next()">Siguiente</button>
</div>

<!-- STEP 3 -->
<div class="step">
<h2>¿Cuántos años tienes?</h2>
<input name="edad" type="number">
<button type="button" onclick="next()">Siguiente</button>
</div>

<!-- STEP 4 -->
<div class="step">
<h2>¿Cuál es tu película favorita?</h2>
<input name="pelicula">
<button type="button" onclick="next()">Siguiente</button>
</div>

<!-- STEP 5 -->
<div class="step">
<h2>¿Qué comida te gusta?</h2>
<input name="comida">
<button type="button" onclick="next()">Siguiente</button>
</div>

<!-- STEP 6 -->
<div class="step">
<h2>¿Cuál es tu situación sentimental?</h2>
<select name="estado">
<option>Soltera</option>
<option>En una relación</option>
<option>Comprometida</option>
<option>Casada</option>
</select>
<button type="button" onclick="next()">Siguiente</button>
</div>

<!-- STEP 7 -->
<div class="step">
<h2>Del 1 al 10, ¿qué me das? 😅</h2>
<input name="calificacion" type="number">
<button type="button" onclick="next()">Siguiente</button>
</div>

<!-- STEP 8 -->
<div class="step">
<h2>¿Quieres seguir hablando conmigo?</h2>
<select name="seguir">
<option>Sí 💖</option>
<option>Tal vez 🤔</option>
<option>Necesito conocerte más 😅</option>
</select>
<button type="button" onclick="next()">Siguiente</button>
</div>

<!-- STEP 9 -->
<div class="step">
<h2>Última pregunta 💌</h2>
<textarea name="mensaje" placeholder="Escribe algo..." required></textarea>
<button type="submit">Enviar 💖</button>
</div>

</form>

</div>

<script>
let current = 0;
const steps = document.querySelectorAll(".step");

function next(){
steps[current].classList.remove("active");
current++;
steps[current].classList.add("active");
playSound();
}
